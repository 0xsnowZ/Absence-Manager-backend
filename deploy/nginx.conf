server {
    listen 80;
    listen [::]:80;

    # Replace with your EC2 public IP or domain name
    server_name _;

    root /var/www/absence-manager/public;
    index index.php;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Max upload size (for Excel imports)
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    charset utf-8;

    # Main location: try static files, fall back to PHP
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Increase timeout for long requests (stats, Excel imports)
        fastcgi_read_timeout 120;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Block access to hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Laravel storage — should not be accessed directly
    location ~* ^/storage/ {
        deny all;
    }

    access_log /var/log/nginx/absence-manager-access.log;
    error_log  /var/log/nginx/absence-manager-error.log;
}
