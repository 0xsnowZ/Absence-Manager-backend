services:
  # ─── Laravel API (Web Service via Docker) ─────────────────────────────────
  - type: web
    name: absence-manager-backend
    runtime: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_NAME
        value: AbsenceManager
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: absence-manager-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: absence-manager-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: absence-manager-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: absence-manager-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: absence-manager-db
          property: password
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      # Set this manually in Render dashboard after the frontend is deployed
      - key: FRONTEND_URL
        value: https://absence-manager-frontend.onrender.com

# ─── PostgreSQL Database ──────────────────────────────────────────────────────
databases:
  - name: absence-manager-db
    region: frankfurt
    plan: free
    databaseName: absence_manager
    user: absence_manager
